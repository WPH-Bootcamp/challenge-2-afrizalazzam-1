<!-- ── SECTION 6: LET'S COLLABORATE ── -->
<section class="section contact" id="contact" aria-labelledby="contact-title">
  <div class="contact__inner">

    <h2 class="section__title" id="contact-title">Let's Collaborate</h2>
    <p class="contact__subtitle">Need a tech team? We're ready to help</p>

    <form class="contact__form" action="#" method="post" novalidate>

      <div class="form-group">
        <label for="contact-name">Name</label>
        <input
          type="text"
          id="contact-name"
          name="name"
          placeholder="Enter your name"
          autocomplete="name"
          required
        />
      </div>

      <div class="form-group">
        <label for="contact-email">Email</label>
        <input
          type="email"
          id="contact-email"
          name="email"
          placeholder="Enter your email"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="contact-message">Message</label>
        <textarea
          id="contact-message"
          name="message"
          placeholder="Enter your message"
          rows="5"
          required
        ></textarea>
      </div>

      <button type="submit" class="btn btn--primary contact__submit">Send</button>

    </form>
  </div>
</section>
